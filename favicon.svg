<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0f766e"/>
  <!-- root node -->
  <rect x="10" y="4" width="12" height="7" rx="2" fill="#ffffff" opacity="0.95"/>
  <!-- stem -->
  <line x1="16" y1="11" x2="16" y2="15" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <!-- left branch -->
  <line x1="16" y1="15" x2="8" y2="19" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <!-- right branch -->
  <line x1="16" y1="15" x2="24" y2="19" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <!-- left child -->
  <rect x="3" y="19" width="10" height="7" rx="2" fill="#ffffff" opacity="0.8"/>
  <!-- right child -->
  <rect x="19" y="19" width="10" height="7" rx="2" fill="#ffffff" opacity="0.8"/>
</svg>
