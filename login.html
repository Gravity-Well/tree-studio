<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — Tree Studio</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      --bg: #edf3f5;
      --panel: #ffffff;
      --ink: #13273a;
      --muted: #4a6170;
      --accent: #0f766e;
      --danger: #b42318;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--panel);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .logo img { border-radius: 6px; }
    .logo span { font-size: 20px; font-weight: 700; color: var(--ink); }
    .tagline { color: var(--muted); font-size: 14px; margin-bottom: 36px; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
    .btn-provider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 13px 18px;
      border-radius: 10px;
      border: 1.5px solid #dde4e8;
      background: var(--panel);
      color: var(--ink);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-provider:hover { border-color: var(--accent); background: #f4faf9; }
    .btn-provider svg { flex-shrink: 0; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #dde4e8;
    }
    .back { margin-top: 28px; font-size: 13px; color: var(--muted); }
    .back a { color: var(--accent); text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/favicon.svg" width="28" height="28" alt="" />
    <span>Tree Studio</span>
  </div>
  <p class="tagline">Build and explore logic trees visually.</p>
  <h2>Sign in to continue</h2>

  <a class="btn-provider" id="githubBtn" href="/.auth/login/github">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
    </svg>
    Continue with GitHub
  </a>

  <div class="divider">or</div>

  <a class="btn-provider" id="msBtn" href="/.auth/login/aad">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <rect x="1" y="1" width="10" height="10" fill="#f25022"/>
      <rect x="13" y="1" width="10" height="10" fill="#7fba00"/>
      <rect x="1" y="13" width="10" height="10" fill="#00a4ef"/>
      <rect x="13" y="13" width="10" height="10" fill="#ffb900"/>
    </svg>
    Continue with Microsoft
  </a>

  <div class="back"><a href="/app">← Back to app</a></div>
</div>

<script>
  // Preserve post_login_redirect query param on provider links
  const params = new URLSearchParams(location.search);
  const redirect = params.get("post_login_redirect");
  if (redirect) {
    const enc = encodeURIComponent(redirect);
    document.getElementById("githubBtn").href = `/.auth/login/github?post_login_redirect=${enc}`;
    document.getElementById("msBtn").href = `/.auth/login/aad?post_login_redirect=${enc}`;
  }
</script>
</body>
</html>
